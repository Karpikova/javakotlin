services:
  website:
    image: nginx:alpine
    container_name: javakotlin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/usr/share/nginx/html:ro
      - ./nginx-conf:/etc/nginx/conf.d:ro
      - ./data/letsencrypt:/etc/letsencrypt:ro   # путь к сертификатам тот же
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: javakotlin_certbot
    volumes:
      - ./src:/var/www/html:ro
      - ./data/letsencrypt:/etc/letsencrypt   # тот же путь, но без :ro, чтобы записывать
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/html --post-hook 'nginx -s reload'; sleep 12h & wait $${!}; done"
    restart: unless-stopped