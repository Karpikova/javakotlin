server {
    listen 80;
    server_name javakotlin.ru www.javakotlin.ru;

    # Специальный location для валидации сертификатов через webroot
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    # Всё остальное перенаправляем на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name javakotlin.ru www.javakotlin.ru;

    # [citation:6] Это путь к сертификатам внутри тома certbot_ssl
    ssl_certificate /etc/letsencrypt/live/javakotlin.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/javakotlin.ru/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}   