    <script>
        function toggleSection(sectionId) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.target === sectionId);
            });
            document.querySelectorAll('.content-section').forEach(sec => {
                sec.classList.toggle('active', sec.id === sectionId);
            });
            const contentDiv = document.getElementById(`${sectionId}-content`);
            if (contentDiv.classList.contains('loading') && !contentDiv.dataset.loaded) {
                loadContent(sectionId, contentDiv);
            }
        }
        async function loadContent(sectionId, targetElement) {
            const fileName = sectionId === 'coroutines' ? 'Coroutines.html' : 'Collections.html';
            try {
                const response = await fetch(fileName);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                let content = doc.querySelector('table') || 
                             doc.body.querySelector(':scope > *:not(style):not(script)') || 
                             doc.body;
                targetElement.innerHTML = '';
                targetElement.appendChild(content.cloneNode(true));
                targetElement.classList.remove('loading');
                targetElement.dataset.loaded = 'true';
            } catch (error) {
                console.error(`Failed to load ${fileName}:`, error);
                targetElement.innerHTML = `
                    <p class="warning">⚠️ Не удалось загрузить файл <code>${fileName}</code></p>
                    <p class="note">Проверьте наличие файла в той же директории.</p>
                `;
                targetElement.classList.remove('loading');
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            if (window.innerWidth > 768) {
                toggleSection('coroutines');
            }
        });
    </script>
